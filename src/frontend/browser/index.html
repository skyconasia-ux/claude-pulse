<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Pulse</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #05050f; --bg2: #0a0a1a; --bg3: #111128;
      --cyan: #00fff0; --purple: #bf00ff; --green: #00ff88;
      --amber: #ffaa00; --red: #ff4455; --gray: #444466;
      --dim: rgba(255,255,255,0.25); --font: 'Courier New', monospace;
    }
    html, body { background: var(--bg); color: var(--cyan); font-family: var(--font); min-height: 100vh; }
    body { padding: 20px 24px; }

    .topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; background: var(--bg2);
      border: 1px solid rgba(0,255,240,0.18); border-radius: 8px; margin-bottom: 20px;
    }
    .logo { font-size: 16px; letter-spacing: 3px; text-shadow: 0 0 12px var(--cyan); }
    .topbar-right { display: flex; gap: 24px; align-items: center; font-size: 12px; color: var(--dim); }
    .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gray); display: inline-block; margin-right: 6px; }
    .conn-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .rate-group { display: flex; gap: 4px; align-items: center; }
    .rate-label { font-size: 10px; letter-spacing: 1px; color: var(--dim); margin-right: 4px; }
    .rate-btn { background: transparent; border: 1px solid rgba(0,255,240,0.15); color: var(--dim); font-family: var(--font); font-size: 10px; letter-spacing: 1px; padding: 3px 9px; border-radius: 3px; cursor: pointer; transition: all 0.15s; }
    .rate-btn:hover { border-color: rgba(0,255,240,0.4); color: var(--cyan); }
    .rate-btn.active { background: rgba(0,255,240,0.1); border-color: rgba(0,255,240,0.5); color: var(--cyan); }
    .rate-btn.refresh-btn { border-color: rgba(191,0,255,0.3); color: rgba(191,0,255,0.7); }
    .rate-btn.refresh-btn:hover { border-color: var(--purple); color: var(--purple); }

    #session-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 18px;
    }

    .tile {
      background: var(--bg2); border: 1px solid rgba(0,255,240,0.15);
      border-radius: 10px; padding: 20px; display: flex; flex-direction: column; gap: 14px;
      transition: border-color 0.3s;
    }
    .tile.stale { opacity: 0.5; border-color: rgba(255,255,255,0.07); }
    .tile.alert-yellow { border-color: rgba(255,170,0,0.35); }
    .tile.alert-red { border-color: rgba(255,68,85,0.4); box-shadow: 0 0 16px rgba(255,68,85,0.12); }

    .tile-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .tile-name-wrap { min-width: 0; }
    .tile-name { font-size: 18px; font-weight: bold; color: var(--cyan); letter-spacing: 1px; text-shadow: 0 0 8px var(--cyan); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tile-session-id { font-size: 9px; color: var(--dim); letter-spacing: 1px; margin-top: 3px; }
    .tile-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }

    .badge { font-size: 10px; letter-spacing: 1.5px; padding: 3px 9px; border-radius: 4px; font-weight: bold; white-space: nowrap; }
    .badge-tool_use    { background: rgba(0,255,240,0.12); color: var(--cyan);  border: 1px solid rgba(0,255,240,0.4); }
    .badge-running     { background: rgba(0,255,136,0.1);  color: var(--green); border: 1px solid rgba(0,255,136,0.35); }
    .badge-thinking    { background: rgba(0,255,240,0.08); color: var(--cyan);  border: 1px solid rgba(0,255,240,0.2); animation: pulse 1.5s infinite; }
    .badge-idle        { background: rgba(255,170,0,0.1);  color: var(--amber); border: 1px solid rgba(255,170,0,0.3); }
    .badge-waiting     { background: rgba(255,170,0,0.07); color: rgba(255,170,0,0.7); border: 1px solid rgba(255,170,0,0.2); }
    .badge-cancelled   { background: rgba(255,68,85,0.1);  color: var(--red);   border: 1px solid rgba(255,68,85,0.3); }
    .badge-closed,
    .badge-stopped,
    .badge-ctrl_c      { background: rgba(68,68,102,0.3);  color: var(--gray);  border: 1px solid rgba(68,68,102,0.5); }
    .badge-not_launched { background: rgba(68,68,102,0.2); color: var(--dim);   border: 1px solid rgba(68,68,102,0.3); }
    .badge-unknown     { background: rgba(255,170,0,0.08); color: rgba(255,170,0,0.6); border: 1px solid rgba(255,170,0,0.2); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .token-hero-label { font-size: 10px; letter-spacing: 2px; color: var(--dim); margin-bottom: 4px; }
    .token-hero-value { font-size: 48px; font-weight: bold; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); letter-spacing: 2px; line-height: 1; }
    .token-breakdown { display: flex; gap: 0; margin-top: 10px; }
    .token-breakdown .seg { padding: 0 16px 0 0; }
    .token-breakdown .seg:not(:last-child) { border-right: 1px solid rgba(255,255,255,0.1); margin-right: 16px; }
    .seg-label { font-size: 9px; letter-spacing: 1px; color: var(--dim); }
    .seg-val { font-size: 15px; font-weight: bold; margin-top: 2px; }
    .seg-in  .seg-val { color: rgba(0,255,240,0.85); }
    .seg-out .seg-val { color: rgba(191,0,255,0.9); }
    .seg-left .seg-val { color: var(--dim); }

    .progress-meta { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-bottom: 5px; }
    .progress-track { background: #0d0d1a; border-radius: 4px; height: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--green), var(--cyan), var(--purple)); box-shadow: 0 0 8px rgba(0,255,240,0.3); transition: width 0.5s ease; }

    .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .stat { background: var(--bg3); border-radius: 6px; padding: 10px 12px; }
    .stat-label { font-size: 9px; letter-spacing: 2px; color: var(--dim); margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: bold; }
    .stat-cost  .stat-value { color: var(--purple); text-shadow: 0 0 8px var(--purple); }
    .stat-turns .stat-value { color: var(--amber);  text-shadow: 0 0 8px var(--amber); }
    .stat-burn  .stat-value { color: var(--cyan); }
    .stat-tools .stat-value { color: rgba(0,255,240,0.5); }
    .stat-eta   .stat-value { color: var(--green); }

    .tile-footer { display: flex; justify-content: space-between; align-items: center; }
    .alert-pill { font-size: 11px; font-weight: bold; letter-spacing: 2px; padding: 4px 12px; border-radius: 4px; }
    .alert-green  { color: var(--green); background: rgba(0,255,136,0.08);  border: 1px solid rgba(0,255,136,0.25); }
    .alert-yellow { color: var(--amber); background: rgba(255,170,0,0.08);  border: 1px solid rgba(255,170,0,0.3); }
    .alert-red    { color: var(--red);   background: rgba(255,68,85,0.08);  border: 1px solid rgba(255,68,85,0.35); }

    .btn-abort {
      background: rgba(255,68,85,0.07); border: 1px solid rgba(255,68,85,0.25);
      color: rgba(255,68,85,0.6); font-family: var(--font); font-size: 11px;
      letter-spacing: 1px; padding: 5px 16px; border-radius: 4px; cursor: pointer; transition: all 0.2s;
    }
    .btn-abort:hover {
      background: rgba(255,68,85,0.18); border-color: var(--red);
      color: var(--red); box-shadow: 0 0 10px rgba(255,68,85,0.3);
    }

    .btn-checkpoint {
      background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.25);
      color: rgba(0,255,136,0.6); font-family: var(--font); font-size: 11px;
      letter-spacing: 1px; padding: 5px 14px; border-radius: 4px; cursor: pointer; transition: all 0.2s;
    }
    .btn-checkpoint:hover {
      background: rgba(0,255,136,0.16); border-color: var(--green);
      color: var(--green); box-shadow: 0 0 10px rgba(0,255,136,0.25);
    }
    .btn-checkpoint.queued {
      border-color: rgba(255,170,0,0.4); color: var(--amber);
      background: rgba(255,170,0,0.07); animation: pulse 1.5s infinite;
    }
    .btn-checkpoint.done {
      border-color: rgba(0,255,136,0.6); color: var(--green);
      background: rgba(0,255,136,0.12);
    }

    #empty-state { display: none; text-align: center; padding: 80px 20px; color: var(--dim); font-size: 13px; letter-spacing: 2px; }
    #empty-state .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.25; }

    .banner {
      display: none; position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      padding: 14px 28px; border-radius: 8px; font-size: 13px; letter-spacing: 2px;
      font-weight: bold; z-index: 200;
    }
    .banner.suggested { background: rgba(255,170,0,0.15); border: 1px solid var(--amber); color: var(--amber); animation: blink-banner 1.2s ease-in-out infinite; }
    .banner.mandatory { background: rgba(255,68,85,0.15); border: 1px solid var(--red);   color: var(--red);   animation: blink-banner 0.7s ease-in-out infinite; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 300; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }
    .confirm-box { background: var(--bg2); border: 1px solid rgba(255,68,85,0.4); border-radius: 10px; padding: 32px 40px; text-align: center; max-width: 420px; }
    .confirm-box h3 { color: var(--red); font-size: 14px; letter-spacing: 2px; margin-bottom: 12px; }
    .confirm-box p  { color: var(--dim); font-size: 12px; margin-bottom: 24px; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 12px; justify-content: center; }
    .btn-cancel { background: transparent; border: 1px solid var(--gray); color: var(--dim); font-family: var(--font); font-size: 12px; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
    .btn-confirm-abort { background: rgba(255,68,85,0.15); border: 1px solid var(--red); color: var(--red); font-family: var(--font); font-size: 12px; letter-spacing: 1px; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }

    .tile-totals {
      background: rgba(0,255,240,0.03); border: 1px solid rgba(0,255,240,0.1);
      border-radius: 6px; padding: 10px 14px; display: grid;
      grid-template-columns: repeat(4, 1fr); gap: 6px;
    }
    .tot-cell { display: flex; flex-direction: column; gap: 2px; }
    .tot-label { font-size: 8px; letter-spacing: 2px; color: var(--dim); }
    .tot-value { font-size: 14px; font-weight: bold; }
    .tot-tokens .tot-value { color: var(--cyan); }
    .tot-cost   .tot-value { color: var(--purple); }
    .tot-turns  .tot-value { color: var(--amber); }
    .tot-tools  .tot-value { color: rgba(0,255,240,0.5); }

    .plan-bar { display: flex; align-items: center; gap: 8px; padding: 5px 0 7px; border-bottom: 1px solid rgba(0,255,240,0.07); margin-bottom: 8px; font-size: 9px; letter-spacing: 1.5px; }
    .plan-pill { padding: 2px 7px; border-radius: 3px; font-size: 9px; letter-spacing: 2px; font-weight: bold; }
    .plan-pill.pro  { background: rgba(0,255,240,0.12); border: 1px solid rgba(0,255,240,0.4); color: var(--cyan); }
    .plan-pill.max  { background: rgba(191,0,255,0.15); border: 1px solid rgba(191,0,255,0.5); color: var(--purple); }
    .plan-pill.free { background: rgba(255,170,0,0.12); border: 1px solid rgba(255,170,0,0.4); color: var(--amber); }
    .plan-pill.unknown { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: var(--dim); }
    .plan-tier { color: var(--dim); }
    .plan-tier.extra { color: var(--amber); }

    .chart-wrap { position: relative; }
    .chart-label { font-size: 9px; letter-spacing: 2px; color: var(--dim); margin-bottom: 5px; }
    .tile-chart { display: block; width: 100%; height: 72px; border-radius: 4px; cursor: crosshair; }

    #chart-tooltip {
      position: fixed; pointer-events: none; display: none; z-index: 9999;
      background: rgba(5,5,15,0.92); border: 1px solid rgba(0,255,240,0.35);
      border-radius: 5px; padding: 6px 10px; font-family: var(--font); font-size: 10px;
      color: var(--cyan); white-space: nowrap; box-shadow: 0 0 12px rgba(0,255,240,0.2);
      transform: translate(-50%, -110%);
    }
    #chart-tooltip .tt-time { color: rgba(255,255,255,0.55); font-size: 9px; margin-bottom: 2px; }
    #chart-tooltip .tt-val  { color: var(--cyan); font-size: 11px; letter-spacing: 1px; }

    @keyframes blink-banner {
      0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
      50% { opacity: 0.55; transform: translateX(-50%) scale(0.98); }
    }

    /* ── History panel ─────────────────────────────────── */
    #history-divider {
      display: none; align-items: center; gap: 12px;
      margin: 16px 0 0; cursor: pointer; user-select: none;
    }
    #history-divider.open { display: flex; }
    .hist-divider-line { flex: 1; height: 1px; background: rgba(255,170,0,0.2); }
    .hist-divider-label {
      font-size: 10px; letter-spacing: 2px; color: rgba(255,170,0,0.6);
      padding: 2px 10px; border: 1px solid rgba(255,170,0,0.25);
      border-radius: 3px; white-space: nowrap;
    }
    #history-divider:hover .hist-divider-label { color: var(--amber); border-color: rgba(255,170,0,0.5); }

    #history-panel {
      display: none; flex-direction: column;
      max-height: 40vh; overflow-y: auto;
      margin-top: 12px; margin-bottom: 20px;
      border: 1px solid rgba(255,170,0,0.15); border-radius: 8px;
      background: var(--bg2);
    }
    #history-panel.open { display: flex; }

    .hist-header {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 0.7fr 0.8fr 0.7fr 0.9fr;
      gap: 6px; padding: 6px 14px;
      background: #070713; color: #333355;
      font-size: 8px; letter-spacing: 1.5px;
      border-bottom: 1px solid rgba(255,170,0,0.1);
      position: sticky; top: 0; z-index: 1;
    }

    .hist-row { padding: 7px 14px; border-bottom: 1px solid #0d0d1f; }
    .hist-row:last-child { border-bottom: none; }
    .hist-row-top {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 0.7fr 0.8fr 0.7fr 0.9fr;
      gap: 6px; margin-bottom: 4px; align-items: baseline;
    }
    .hist-project { color: var(--cyan); font-size: 10px; }
    .hist-branch   { color: var(--dim); font-size: 9px; }
    .hist-date     { color: var(--dim); font-size: 9px; }
    .hist-cost     { color: var(--purple); font-size: 10px; text-align: right; }

    .hist-bar-track { background: #0d0d1f; border-radius: 2px; height: 3px; margin-bottom: 4px; overflow: hidden; }
    .hist-bar-fill  { height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--green), var(--amber), var(--red));
      transition: width 0.4s ease; }

    .hist-row-bottom {
      display: grid;
      grid-template-columns: 2.5fr 1fr 0.7fr 0.7fr 0.8fr 0.7fr 0.9fr;
      gap: 6px; font-size: 9px; color: var(--dim);
    }
    .hist-turns-low      { color: #444466; }
    .hist-turns-normal   { color: var(--amber); }
    .hist-turns-high     { color: #ff6622; }
    .hist-turns-critical { color: var(--red); font-weight: bold; }
    .hist-waste-good     { color: var(--green); }
    .hist-waste-warn     { color: var(--amber); }
    .hist-waste-high     { color: #ff6622; }
    .hist-waste-critical { color: var(--red); }
    .hist-tokens { color: var(--cyan); }
    .hist-cache  { color: var(--green); }

    .hist-footer {
      padding: 6px 14px; background: #070713;
      display: flex; gap: 20px; flex-wrap: wrap;
      color: #333355; font-size: 9px; letter-spacing: 1px;
      border-top: 1px solid rgba(255,170,0,0.1);
      position: sticky; bottom: 0;
    }
    .hist-footer-tokens { color: var(--cyan); }
    .hist-footer-cost   { color: var(--purple); }
    .hist-footer-warn   { color: var(--amber); }
    .hist-footer-crit   { color: var(--red); }

    .btn-history {
      background: transparent; border: 1px solid rgba(255,170,0,0.3);
      color: rgba(255,170,0,0.7); font-family: var(--font); font-size: 10px;
      letter-spacing: 1px; padding: 3px 9px; border-radius: 3px; cursor: pointer; transition: all 0.15s;
    }
    .btn-history:hover  { border-color: var(--amber); color: var(--amber); }
    .btn-history.active { background: rgba(255,170,0,0.1); border-color: var(--amber); color: var(--amber); }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="logo">⬡ Claude Pulse</span>
    <div class="topbar-right">
      <div class="rate-group">
        <span class="rate-label">UPDATE</span>
        <button class="rate-btn" data-rate="high">High</button>
        <button class="rate-btn" data-rate="normal">Normal</button>
        <button class="rate-btn" data-rate="low">Low</button>
        <button class="rate-btn" data-rate="paused">Paused</button>
        <button class="rate-btn refresh-btn" data-rate="refresh">↺ Now</button>
      </div>
      <button class="btn-history" id="btn-history">▲ HISTORY</button>
      <span><span class="conn-dot" id="conn-dot"></span><span id="conn-label">Connecting...</span></span>
      <span id="session-count">0 sessions</span>
      <span id="elapsed">0s</span>
    </div>
  </div>

  <div id="session-grid"></div>
  <div id="empty-state">
    <div class="empty-icon">⬡</div>
    <div>No sessions yet — start Claude Code with hooks configured</div>
  </div>

  <div id="history-divider">
    <div class="hist-divider-line"></div>
    <span class="hist-divider-label">▲ HISTORY</span>
    <div class="hist-divider-line"></div>
  </div>

  <div id="history-panel">
    <div class="hist-header">
      <span>PROJECT · BRANCH</span><span>DATE</span><span>TURNS</span>
      <span>WASTE</span><span>TOKENS</span><span>CACHE</span><span style="text-align:right">COST</span>
    </div>
    <div id="history-rows"></div>
    <div class="hist-footer" id="history-footer">Loading...</div>
  </div>

  <div class="banner" id="banner"></div>
  <div id="chart-tooltip"><div class="tt-time" id="tt-time"></div><div class="tt-val" id="tt-val"></div></div>

  <div class="overlay" id="abort-overlay">
    <div class="confirm-box">
      <h3>⚠ ABORT SESSION?</h3>
      <p id="abort-confirm-text"></p>
      <div class="confirm-btns">
        <button class="btn-cancel" id="abort-cancel">Cancel</button>
        <button class="btn-confirm-abort" id="abort-confirm">Abort</button>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
